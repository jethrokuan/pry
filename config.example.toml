# pry configuration
# Copy to ~/.config/pry/config.toml and customize.

# ---------------------------------------------------------------------------
# General
# ---------------------------------------------------------------------------

# External editor for composing review comments (e.g. "nvim", "code --wait").
# Leave empty to use $EDITOR / $VISUAL.
# editor = ""

# Number of PRs to fetch per filter tab (max 100, GitHub API limit).
# page_size = 30

# Timeout for each GitHub API request. Go duration format (e.g. "30s", "1m").
# Increase if you see 502 errors or timeouts on large repos. Default: no timeout.
# api_timeout = "30s"

# [cache]
# Cache PR list results per filter. Avoids repeated API calls when switching
# between filters. Press 'r' to force a refresh. Cache is persisted to disk
# (~/.cache/pry/ or ~/Library/Caches/pry/) so it survives restarts.
# enabled = true
# ttl = "5m"     # Go duration format (e.g. "5m", "1h")

# ---------------------------------------------------------------------------
# Theme
# ---------------------------------------------------------------------------
#
# Colors are inherited from your terminal's ANSI palette (the 16 standard
# colors: black, red, green, yellow, blue, magenta, cyan, white + bright
# variants). To change the look, configure your terminal emulator's color
# scheme (Catppuccin, Solarized, Dracula, Gruvbox, Nord, etc.) and pry
# will adapt automatically.

# ---------------------------------------------------------------------------
# PR List Filters
# ---------------------------------------------------------------------------

# Custom filter presets for the PR list. Replaces built-in filters when set.
# Uses GitHub search qualifiers (https://docs.github.com/en/search-github).
# The query builder automatically prepends "is:pr repo:<owner>/<repo>".
#
# Default filters (used when none are configured):
#   "My PRs"                    is:open author:@me
#   "Assigned to Me"            is:open assignee:@me
#   "Needs My Review"           is:open review-requested:@me draft:false
#   "Involved"                  is:open involves:@me -author:@me
#
# [[filters]]
# name      = "My PRs"
# qualifier = "is:open author:@me"
#
# [[filters]]
# name      = "All Open"
# qualifier = "is:open"
#
# [[filters]]
# name      = "Needs My Review"
# qualifier = "is:open review-requested:@me draft:false"

# ---------------------------------------------------------------------------
# PR List Columns
# ---------------------------------------------------------------------------

# Columns to display in the PR list and their order.
# Available: "state", "number", "title", "author", "changes", "ci",
#            "my_review", "my_teams", "pending_teams", "updated"
#
# columns = ["state", "number", "title", "author", "changes", "ci", "my_review", "my_teams", "updated"]

# ---------------------------------------------------------------------------
# File Tree
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# PR List Layout
# ---------------------------------------------------------------------------

# [pr_list]
# Width of the sidebar preview pane in columns.
# sidebar_width = 50
# Whether the sidebar starts visible (toggle with 'p').
# sidebar_visible = false

# ---------------------------------------------------------------------------
# File Tree
# ---------------------------------------------------------------------------

# [file_tree]
# Enable CODEOWNERS-based owner filter in the diff file tree.
# Defaults to off. Set to true to filter files to those you own.
# owner_filter = true

# ---------------------------------------------------------------------------
# AI Review Assistant
# ---------------------------------------------------------------------------

# [ai]
# Enable the AI review assistant. Requires `claude` CLI installed
# (npm install -g @anthropic-ai/claude-code).
# enabled = false

# Model to use. Optional — uses Claude Code's default if not set.
# model = "sonnet"

# Maximum agent turns per query. Higher = deeper exploration, slower response.
# Optional — uses Claude Code's default if not set (0 = default).
# max_turns = 10
